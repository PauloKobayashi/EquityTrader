# ============================================================
# RAM Intraday Trading Robot — maze-runner-inspired GE (NSGA-II baseline)
# ============================================================
# Roundhill T-REX 2X Long DRAM ETF (RAM). Belief-map robot, long/flat.
# 3 objectives: OOS return (max), Ulcer (min), robustness gap (min).
#
# Run:
#   RAM_DATA=private/ram_intraday/data/RAM_1min.csv \
#     PYTHONPATH=zion/src ge run -c private/ram_intraday/configs/ram_intraday.yaml
# ============================================================

run:
  name: ram_intraday_v1
  seed: 42
  stop_conditions:
    max_evals: 5000
    max_time_seconds: 21600      # 6h cap so the 5000-eval budget is the binding limit
    stagnation_window: 1500      # large, so it won't early-stop before spending the budget
  checkpoint:
    enabled: true
    interval_evals: 20
    path: checkpoints/ram_intraday/
    pareto_snapshot_interval: 10

grammar:
  name: ram_grammar
  version: "1.0"
  builder_module: grammars.ram_grammar
  builder_function: build_grammar

problem:
  type: custom
  eval_module: fitness
  eval_function: evaluate
  param_dim: 7            # max params any single gene needs (trading module)
  param_lower: 0.0
  param_upper: 1.0

islands:
  defaults:
    population_size: 40
    selection_algo: nsga2
    operator_rates:
      crossover: 0.6
      mutation: 0.3
      param_mutation: 0.15
    elitism_ratio: 0.15
    replacement_strategy: steady_state
  overrides:
    "explorer":
      population_size: 40
      operator_rates: {crossover: 0.4, mutation: 0.5, param_mutation: 0.15}
    "exploiter":
      population_size: 40
      operator_rates: {crossover: 0.7, mutation: 0.2, param_mutation: 0.1}
    "balanced":
      population_size: 40
      operator_rates: {crossover: 0.6, mutation: 0.3, param_mutation: 0.15}

migration:
  topology: ring
  policy:
    interval: 10
    count: 2
    selection_method: best
    replacement_method: worst

evaluation:
  timeout_seconds: 300.0
  retries: 0
  cache_phenotype: true
  objectives:
    - name: oos_return
      direction: max
    - name: ulcer
      direction: min
    - name: robustness_gap
      direction: min

executor:
  backend: local          # workers>1 => LocalPoolExecutor (process pool)
  workers: 12
  ray_config: null

database:
  backend: mongodb
  url: ${DATABASE_URL:mongodb://localhost:27017/zion}
  pool_size: 5

micro_ga:
  enabled: false
