# ============================================================
# RAM Intraday Robot — morpheus deep-RL OUTER optimizer (selection_algo: morpheus)
# ============================================================
# NOTE: two orthogonal "morpheus" axes exist:
#   - INNER robot family `morpheus_trader` (a PPO policy that IS the robot) — selectable
#     by the grammar in ANY config, including this one.
#   - OUTER `morpheus` selector below (deep-RL that EVOLVES the robots).
# The outer selector needs the external Morpheus package
# (/Users/paulokobayashi/Documents/Morpheus, see zion/docs/morpheus-optimizer.md).
# If it is unavailable the engine falls back to NSGA-II.
# ============================================================
run:
  name: ram_intraday_morpheus_v1
  seed: 42
  stop_conditions:
    max_evals: 5000
    max_time_seconds: 21600      # 6h cap so the 5000-eval budget is the binding limit
    stagnation_window: 1500
  checkpoint:
    enabled: true
    interval_evals: 20
    path: checkpoints/ram_intraday_morpheus/
    pareto_snapshot_interval: 10

grammar:
  name: ram_grammar
  version: "1.0"
  builder_module: grammars.ram_grammar
  builder_function: build_grammar

problem:
  type: custom
  eval_module: fitness
  eval_function: evaluate
  param_dim: 7
  param_lower: 0.0
  param_upper: 1.0

islands:
  defaults:
    population_size: 120
    selection_algo: morpheus
    operator_rates: {crossover: 0.6, mutation: 0.3, param_mutation: 0.15}
    elitism_ratio: 0.15
    replacement_strategy: steady_state

migration:
  topology: ring
  policy: {interval: 10, count: 2, selection_method: best, replacement_method: worst}

evaluation:
  timeout_seconds: 300.0
  retries: 0
  cache_phenotype: true
  objectives:
    - {name: oos_return, direction: max}
    - {name: ulcer, direction: min}
    - {name: robustness_gap, direction: min}

executor:
  backend: local          # workers>1 => LocalPoolExecutor (process pool)
  workers: 12
  ray_config: null

database:
  backend: mongodb
  url: ${DATABASE_URL:mongodb://localhost:27017/zion}
  pool_size: 5

morpheus:
  model_name: ram_intraday_scorenet
  online: true
  reward_mode: hv_delta
  train_interval: 10
  warmup_evals: 30
  operator_bandit: true

micro_ga:
  enabled: false
